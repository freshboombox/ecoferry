<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFerry | Seu bolso e o planeta agradecem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="glass-container">
        <header>
            <span class="badge">Sustentabilidade Urbana</span>
            <h1>EcoFerry<span>.</span></h1>
            <p>Bora ver quanto o seu trajeto tá custando pro seu bolso e pro mundo?</p>
        </header>

        <section class="calculator-box">
            <div class="input-group">
                <label>Distância diária (ida + volta)</label>
                <div class="input-wrapper">
                    <input type="number" id="distancia" placeholder="Ex: 12">
                    <span class="unit">km</span>
                </div>
            </div>

            <div class="input-group">
                <label>Como você vai?</label>
                <select id="transporte">
                    <option value="carro">🚗 De carro (Combustão)</option>
                    <option value="onibus">🚌 No busão (Coletivo)</option>
                    <option value="bike">🚲 Pedalando / A pé</option>
                </select>
            </div>

            <div class="input-group">
                <label>Frequência na semana</label>
                <div class="chips" id="frequencia-chips">
                    <input type="radio" name="freq" value="3" id="f3"><label for="f3">3x</label>
                    <input type="radio" name="freq" value="5" id="f5" checked><label for="f5">5x</label>
                    <input type="radio" name="freq" value="7" id="f7"><label for="f7">Diário</label>
                </div>
            </div>

            <button onclick="gerarImpacto()" id="btn-calc">Calcular meu impacto</button>
        </section>

        <section id="resultado" class="results-area">
            <div class="loading-bar"><div class="progress"></div></div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <small>Gasto mensal</small>
                    <h2 id="res-gasto">R$ 0,00</h2>
                </div>
                <div class="stat-card">
                    <small>Pegada de CO2</small>
                    <h2 id="res-co2">0 kg</h2>
                </div>
            </div>
            
            <div class="insight-box">
                <p id="dica-sustentavel"></p>
            </div>
        </section>

        <footer>
            <p class="disclaimer">*O EcoFerry usa médias estimadas. Preços de combustíveis e tarifas podem variar na sua região.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
