<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMove - Simulador de Impacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌱 EcoMove</h1>
        <p>Calcule o impacto financeiro e ambiental da sua locomoção.</p>

        <div class="form">
            <label>Distância diária (Ida e volta em km):</label>
            <input type="number" id="distancia" placeholder="Ex: 15">

            <label>Meio de transporte:</label>
            <select id="transporte">
                <option value="carro">Carro</option>
                <option value="onibus">Ônibus</option>
                <option value="bike">Bicicleta / A pé</option>
            </select>

            <button onclick="calcular()">Calcular Impacto</button>
        </div>

        <div id="resultado" class="hidden">
            <hr>
            <h3>Resumo Mensal (22 dias)</h3>
            <div class="cards">
                <div class="card">
                    <span>💰 Gasto</span>
                    <p id="res-gasto">R$ 0,00</p>
                </div>
                <div class="card">
                    <span>☁️ CO2</span>
                    <p id="res-co2">0 kg</p>
                </div>
            </div>
            <p id="dica-sustentavel"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
