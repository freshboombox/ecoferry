<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFerry - Seu Simulador Eco-Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>⛴️ EcoFerry</h1>
        <p>Transforme seus quilômetros em consciência ambiental e economia.</p>

        <div class="form">
            <label for="distancia">Distância diária (Ida e volta em km):</label>
            <input type="number" id="distancia" placeholder="Ex: 10" min="1">

            <label for="transporte">Como você se move?</label>
            <select id="transporte">
                <option value="carro">Carro (Combustão)</option>
                <option value="onibus">Ônibus Coletivo</option>
                <option value="bike">Bicicleta ou Caminhada</option>
            </select>

            <div class="formulario-perfil">
                <h3>📝 Perfil de Mobilidade</h3>
                <label for="frequencia">Quantas vezes por semana?</label>
                <select id="frequencia">
                    <option value="5">5 dias (Rotina padrão)</option>
                    <option value="3">3 dias (Híbrido)</option>
                    <option value="7">Todos os dias (7 dias)</option>
                    <option value="2">Final de semana (2 dias)</option>
                </select>
            </div>

            <button onclick="calcular()">Calcular Impacto</button>
        </div>

        <div id="resultado">
            <hr>
            <h3>Resumo Mensal Estipulado</h3>
            <div class="cards">
                <div class="card">
                    <span>💰 Gasto</span>
                    <p id="res-gasto">R$ 0,00</p>
                </div>
                <div class="card">
                    <span>☁️ CO2</span>
                    <p id="res-co2">0 kg</p>
                </div>
            </div>
            <p id="dica-sustentavel"></p>
        </div>

        <p class="observacao">*O site pode cometer erros devido a mudança de preços do combustível ou valor de passagem de ônibus de cidade para cidade</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
